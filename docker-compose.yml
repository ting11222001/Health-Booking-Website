services:
  mongodb:
    image: mongo:7
    container_name: thriveful-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: thriveful
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
